<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK-SHIELD | SYSTEM V10.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@700&display=swap');
        :root { --neon: #00ff41; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; background: var(--bg); font-family: 'Fira Code', monospace; overflow: hidden; }

        /* এটি একটি বড় অদৃশ্য বাটন যা পুরো স্ক্রিন জুড়ে থাকবে */
        #auth-trigger {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #000; z-index: 9999; cursor: pointer;
            border: 2px solid var(--neon);
        }

        .pulse { color: var(--neon); font-size: 1.2rem; text-align: center; letter-spacing: 2px; animation: blink 1s infinite; }
        .tap-text { color: #fff; margin-top: 20px; font-size: 0.8rem; opacity: 0.6; }

        #dashboard { display: none; padding: 20px; height: 100%; }
        .glitch { font-size: 2rem; color: var(--neon); text-align: center; margin-top: 20px; text-shadow: 0 0 10px var(--neon); }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="auth-trigger" onclick="launchSystem()">
        <div class="pulse">[ RK-SHIELD CORE: ACTIVE ]</div>
        <div class="tap-text">TAP ANYWHERE TO AUTHENTICATE</div>
    </div>

    <div id="dashboard">
        <h1 class="glitch">RK-SHIELD ONLINE</h1>
        <div style="border: 1px solid var(--neon); margin-top: 50px; padding: 20px; color: #0f0; font-size: 0.9rem;">
            <p>> Accessing secure nodes...</p>
            <p>> Connection: Encrypted</p>
            <p id="audio-status" style="color: yellow;">> Audio: Initializing...</p>
        </div>
    </div>

    <script>
        function launchSystem() {
            // ১. ডিসপ্লে পরিবর্তন
            document.getElementById('auth-trigger').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';

            // ২. ভয়েস মেসেজ (স্পিচ ইঞ্জিন)
            const speech = new SpeechSynthesisUtterance();
            speech.text = "System authentication successful. Welcome, R K. Shield mode is now active on kumed official dot online.";
            speech.lang = 'en-US';
            speech.rate = 0.85;
            speech.pitch = 0.7;

            // ভয়েস শুরু
            window.speechSynthesis.speak(speech);
            
            // ৩. স্ট্যাটাস আপডেট
            setTimeout(() => {
                document.getElementById('audio-status').innerHTML = "> Audio: Playback Successful";
                document.getElementById('audio-status').style.color = "#00ff41";
            }, 1000);
        }
    </script>
</body>
</html>
