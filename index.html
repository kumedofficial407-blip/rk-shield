<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK-SHIELD | ELITE CYBER ENGINE v7.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap');

        :root {
            --neon: #00ff41;
            --bg: #000;
            --danger: #ff003c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Fira Code', monospace;
            overflow-x: hidden;
        }

        /* ম্যাট্রিক্স ব্যাকগ্রাউন্ড */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }

        /* হেডার গ্লিচ */
        header {
            padding: 40px;
            text-align: center;
            border-bottom: 2px solid var(--neon);
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 30px var(--neon);
        }

        .glitch {
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--neon);
            position: relative;
            text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.025em -0.05em 0 rgba(0, 255, 0, 0.75), 0.025em 0.05em 0 rgba(0, 0, 255, 0.75);
            animation: glitch 500ms infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.05em -0.025em 0 rgba(0, 255, 0, 0.75); }
            50% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 rgba(0, 255, 0, 0.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255, 0, 0, 0.75), -0.025em -0.05em 0 rgba(0, 255, 0, 0.75); }
        }

        main {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 40px;
            max-width: 1600px;
            margin: auto;
        }

        .panel {
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid var(--neon);
            padding: 25px;
            box-shadow: inset 0 0 10px var(--neon);
            border-radius: 10px;
        }

        .panel h2 { color: var(--neon); font-size: 1.2rem; margin-bottom: 15px; text-transform: uppercase; }

        /* রাডার অ্যানিমেশন */
        .radar {
            width: 150px; height: 150px;
            border: 2px solid var(--neon);
            border-radius: 50%;
            margin: 20px auto;
            position: relative;
            background: repeating-radial-gradient(rgba(0, 255, 0, 0.1), rgba(0, 255, 0, 0.1) 10%, transparent 10%, transparent 20%);
        }
        .radar::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 50%; height: 2px; background: var(--neon);
            transform-origin: left; animation: rotate 3s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* লাইভ কাউন্টার */
        .counter { font-size: 2rem; color: var(--danger); text-align: center; font-weight: bold; }

        footer {
            text-align: center; padding: 20px; border-top: 2px solid var(--neon);
            background: black; font-size: 0.8rem;
        }

        button {
            width: 100%; padding: 15px; background: none; border: 1px solid var(--neon);
            color: var(--neon); font-family: 'Fira Code'; font-weight: bold;
            transition: 0.3s; margin-top: 10px;
        }
        button:hover { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }

    </style>
</head>
<body onclick="playWelcome()">

    <canvas id="bg-canvas"></canvas>

    <header>
        <div class="glitch">RK-SHIELD ELITE</div>
        <p>> SYSTEM STATUS: <span id="sys-status" style="color:red;">UNSECURED</span> | RECONNAISSANCE MODE</p>
    </header>

    <main>
        <section class="panel">
            <h2>Visitor Identification</h2>
            <p>IP: <span id="ip" style="color:var(--neon)">Analyzing...</span></p>
            <p>CITY: <span id="city">Wait...</span></p>
            <p>ISP: <span id="isp">Wait...</span></p>
            <div class="radar"></div>
        </section>

        <section class="panel">
            <h2>Terminal logs</h2>
            <div id="logs" style="font-size: 0.8rem; height: 180px; overflow: hidden; color: #00ff00;"></div>
        </section>

        <section class="panel">
            <h2>Live Traffic</h2>
            <div class="counter" id="visitor-count">104</div>
            <p style="text-align:center; font-size:0.7rem;">Active Threats Detected</p>
            <button onclick="alert('DEEP SCAN INITIATED!')">RUN SYSTEM DIAGNOSTICS</button>
        </section>
    </main>

    <footer>
        <p>© 2026 kumedofficial.online | ENCRYPTED BY RK-ULTRA V5.0</p>
    </footer>

    <script>
        // আইপি ডিটেইলস
        fetch('https://ipapi.co/json/').then(res => res.json()).then(data => {
            document.getElementById('ip').innerText = data.ip;
            document.getElementById('city').innerText = data.city;
            document.getElementById('isp').innerText = data.org;
            document.getElementById('sys-status').innerText = "SECURED";
            document.getElementById('sys-status').style.color = "#00ff41";
        });

        // ম্যাট্রিক্স রেইন
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 10)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#0F0"; drops.forEach((y,i) => {
                ctx.fillText(String.fromCharCode(Math.random()*128), i*10, y*10);
                if(y*10 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);

        // লগস এনিমেশন
        const logsBox = document.getElementById('logs');
        const phrases = ["> Bypassing Firewall...", "> Accessing Database...", "> Packet Sniffing...", "> Payload Injected.", "> Encryption Keys Found."];
        setInterval(() => {
            let p = document.createElement('p');
            p.innerText = phrases[Math.floor(Math.random()*phrases.length)];
            logsBox.appendChild(p);
            if(logsBox.children.length > 8) logsBox.removeChild(logsBox.firstChild);
        }, 1500);

        // সাউন্ড ইফেক্ট (ইউজার সাইটে ক্লিক করলে বাজবে)
        function playWelcome() {
            const msg = new SpeechSynthesisUtterance("System Access Granted. Welcome to RK Shield");
            msg.rate = 0.8; window.speechSynthesis.speak(msg);
        }

        // র্যান্ডম ভিজিটর কাউন্টার
        setInterval(() => {
            document.getElementById('visitor-count').innerText = Math.floor(Math.random() * (200 - 100) + 100);
        }, 3000);
    </script>
</body>
</html>
