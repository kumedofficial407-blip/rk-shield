<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK-SHIELD | LIVE ACTION v20.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;700&display=swap');
        :root { --neon: #00ff41; --danger: #ff003c; --blue: #00d4ff; --purple: #bc13fe; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { background: #000; color: white; font-family: 'Fira Code', monospace; overflow: hidden; }

        header { padding: 15px; text-align: center; border-bottom: 2px solid var(--neon); background: #050505; z-index: 10; }
        .title { font-size: 1.8rem; color: var(--neon); text-shadow: 0 0 10px var(--neon); letter-spacing: 3px; }

        .main-layout { display: flex; height: calc(100vh - 65px); }
        .tool-sidebar { width: 250px; background: #080808; border-right: 1px solid #222; overflow-y: auto; padding: 10px; }
        .tool-btn { width: 100%; padding: 10px; background: transparent; border: 1px solid #1a1a1a; color: #666; text-align: left; margin-bottom: 5px; cursor: pointer; font-size: 0.75rem; }
        .tool-btn:hover, .tool-btn.active { border-color: var(--neon); color: var(--neon); background: rgba(0,255,65,0.05); }

        .terminal-area { flex: 1; padding: 15px; display: flex; flex-direction: column; background: #000; position: relative; }
        #console { flex: 1; background: rgba(0,0,0,0.9); border: 1px solid #222; border-radius: 5px; padding: 15px; overflow-y: auto; font-size: 0.85rem; color: var(--neon); line-height: 1.5; }

        #custom-alert {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 320px; background: #0a0a0a; border: 2px solid var(--purple);
            padding: 25px; border-radius: 10px; display: none; z-index: 2000;
            text-align: center; box-shadow: 0 0 50px var(--purple);
        }
        .key-input { width: 100%; padding: 10px; background: #000; border: 1px solid var(--purple); color: #fff; margin: 15px 0; text-align: center; font-family: 'Fira Code'; }
        .btn-unlock { background: var(--purple); border: none; padding: 10px 20px; color: #fff; font-weight: bold; cursor: pointer; width: 100%; border-radius: 3px; }

        .status-bar { padding: 8px; background: #0a0a0a; display: flex; justify-content: space-between; font-size: 0.65rem; color: #444; border-top: 1px solid #111; }
    </style>
</head>
<body onclick="onceVoice()">

    <header>
        <div class="title">RK-SHIELD LIVE ACTION</div>
    </header>

    <div class="main-layout">
        <div class="tool-sidebar" id="sidebar"></div>
        <div class="terminal-area">
            <div id="console">
                <p>> [SYSTEM] Awaiting Master Key Authentication...</p>
                <p>> [INFO] Master Key will enable Real-Time Tracking.</p>
            </div>
            <div class="status-bar">
                <span>SAT-LINK: ACTIVE | RK-CORE: v20.0</span>
                <span id="clock">00:00:00</span>
            </div>
        </div>
    </div>

    <div id="custom-alert">
        <h3 id="alert-title" style="color: var(--purple); font-size: 1rem;">LICENSE REQUIRED</h3>
        <p style="font-size: 0.7rem; color: #888; margin-top: 10px;">Enter Master Key to Unlock Live Tools.</p>
        <input type="text" class="key-input" id="key-val" placeholder="ENTER MASTER KEY">
        <button class="btn-unlock" onclick="verifyMasterKey()">AUTHENTICATE</button>
    </div>

    <script>
        const tools = ["IP-Vanish", "Sat-Ping", "SQL-Auto", "Port-Scanner", "OS-Detector", "Browser-Spy", "Cloud-Cracker", "Deep-Fake Scan", "Proxy-Chain", "MAC-Spoofer", "Meta-Sploit V9", "Ransom-Shield"];
        
        const sidebar = document.getElementById('sidebar');
        const consoleBox = document.getElementById('console');
        let currentTool = "";
        let hasVoicePlayed = false;

        tools.forEach(t => {
            const btn = document.createElement('button');
            btn.className = 'tool-btn';
            btn.innerText = `> ${t.toUpperCase()}`;
            btn.onclick = () => {
                currentTool = t;
                document.getElementById('custom-alert').style.display = 'block';
            };
            sidebar.appendChild(btn);
        });

        function verifyMasterKey() {
            const key = document.getElementById('key-val').value;
            if(key === "RK-MASTER-GOD-99") {
                document.getElementById('custom-alert').style.display = 'none';
                executeLiveAction(currentTool);
            } else {
                alert("ACCESS DENIED!");
            }
        }

        // আসল কাজ করার ফাংশন
        function executeLiveAction(name) {
            consoleBox.innerHTML += `<p style="color: var(--blue); margin-top: 10px;">> [MASTER] Initializing Real-Time ${name}...</p>`;
            
            // রিয়েল ডাটা ফেচিং
            if(name === "IP-Vanish" || name === "Browser-Spy" || name === "OS-Detector") {
                fetch('https://ipapi.co/json/')
                .then(res => res.json())
                .then(data => {
                    writeToConsole(`Target IP Found: ${data.ip}`);
                    writeToConsole(`City: ${data.city}, ${data.country_name}`);
                    writeToConsole(`ISP: ${data.org}`);
                    writeToConsole(`Latitude: ${data.latitude}, Longitude: ${data.longitude}`);
                    writeToConsole(`Device OS: ${navigator.platform}`);
                    writeToConsole(`Status: TARGET SUCCESSFULLY TRACKED.`);
                });
            } else {
                // অন্যান্য টুলের জন্য ডিটেইলড সিমুলেশন
                writeToConsole(`Scanning remote server for open ports...`);
                setTimeout(() => writeToConsole(`[OK] Port 80 found. Attempting bypass...`), 1000);
                setTimeout(() => writeToConsole(`[SUCCESS] Encryption cracked. Accessing node.`), 2000);
            }
        }

        function writeToConsole(text) {
            const p = document.createElement('p');
            p.innerText = `> ${text}`;
            consoleBox.appendChild(p);
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        // ভয়েস ফিক্স: শুধু একবার বলবে
        function onceVoice() {
            if (!hasVoicePlayed) {
                const msg = new SpeechSynthesisUtterance("Welcome RK. Master Mode initialized. Systems are ready.");
                msg.rate = 0.9; 
                window.speechSynthesis.speak(msg);
                hasVoicePlayed = true;
            }
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
