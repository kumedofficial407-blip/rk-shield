<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK-SHIELD | FINAL RECON v8.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap');
        :root { --neon: #00ff41; --bg: #000; --danger: #ff003c; --blue: #00d4ff; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { background: var(--bg); color: white; font-family: 'Fira Code', monospace; overflow-x: hidden; }
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.12; }
        
        /* এন্ট্রি স্ক্রিন */
        #welcome-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #0a0a0a 0%, #000 100%); z-index: 1000; display: flex; align-items: center; justify-content: center; text-align: center; border: 5px solid var(--neon); box-sizing: border-box; }
        .pulse-text { color: var(--neon); font-size: 1.5rem; animation: pulse 1.5s infinite; letter-spacing: 3px; }

        header { padding: 30px; text-align: center; border-bottom: 2px solid var(--neon); background: rgba(0,0,0,0.9); box-shadow: 0 0 20px var(--neon); }
        .glitch-title { font-size: 2.5rem; color: var(--neon); text-shadow: 2px 2px var(--danger); animation: flicker 3s infinite; }

        main { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; padding: 25px; max-width: 1500px; margin: auto; }
        .panel { background: rgba(10, 10, 10, 0.9); border: 1px solid var(--neon); padding: 20px; border-radius: 8px; position: relative; box-shadow: 0 0 10px rgba(0,255,65,0.1); }
        .panel h2 { color: var(--neon); font-size: 1rem; margin-bottom: 15px; text-transform: uppercase; border-left: 3px solid var(--neon); padding-left: 10px; }

        /* রেজাল্ট ডিসপ্লে সেকশন */
        #result-display { background: #050505; border: 1px solid var(--blue); padding: 15px; height: 200px; overflow-y: auto; font-size: 0.85rem; color: var(--blue); border-radius: 5px; }
        .res-line { margin-bottom: 5px; border-bottom: 1px solid rgba(0, 212, 255, 0.1); padding-bottom: 2px; }

        /* প্রগ্রেস বার */
        .progress-container { width: 100%; background: #222; height: 10px; margin-top: 10px; border-radius: 5px; overflow: hidden; display: none; }
        .progress-bar { height: 100%; background: var(--neon); width: 0%; transition: width 0.1s; }

        .btn-scan { width: 100%; padding: 12px; background: none; border: 1px solid var(--neon); color: var(--neon); font-family: 'Fira Code'; font-weight: bold; margin-top: 15px; transition: 0.3s; }
        .btn-scan:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.05); } }
        @keyframes flicker { 0% { opacity: 1; } 10% { opacity: 0.8; } 20% { opacity: 1; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="welcome-overlay" onclick="bootSystem()">
        <div>
            <h2 class="pulse-text">[ INITIALIZING RK-SHIELD ]</h2>
            <p style="margin-top: 20px; color: #555;">SECURITY CLEARANCE REQUIRED<br>TAP TO AUTHENTICATE</p>
        </div>
    </div>

    <canvas id="bg-canvas"></canvas>

    <header>
        <h1 class="glitch-title">RK-SHIELD RECON v8.0</h1>
        <p style="font-size: 0.8rem; opacity: 0.7;">CONNECTED TO: <span style="color:var(--neon)">kumedofficial.online</span></p>
    </header>

    <main>
        <section class="panel">
            <h2>Visitor Recon</h2>
            <p>IP: <span id="ip" style="color:var(--neon)">...</span></p>
            <p>CITY: <span id="city">...</span></p>
            <p>ISP: <span id="isp">...</span></p>
            <div style="margin-top: 15px; font-size: 0.7rem; color: var(--danger);">[ STATUS: MONITORING LIVE TRAFFIC ]</div>
        </section>

        <section class="panel" style="grid-column: span 1;">
            <h2>Target Analysis Results</h2>
            <div id="result-display">
                <div class="res-line">> Awaiting Target Data...</div>
            </div>
            <div class="progress-container" id="p-cont"><div class="progress-bar" id="p-bar"></div></div>
            <button class="btn-scan" onclick="runAnalysis()">START DEEP ANALYSIS</button>
        </section>

        <section class="panel">
            <h2>Core Execution Logs</h2>
            <div id="logs" style="font-size: 0.8rem; height: 180px; overflow: hidden; color: #00ff00;"></div>
        </section>
    </main>

    <script>
        // আইপি ডাটা
        fetch('https://ipapi.co/json/').then(res => res.json()).then(data => {
            document.getElementById('ip').innerText = data.ip;
            document.getElementById('city').innerText = data.city;
            document.getElementById('isp').innerText = data.org;
        });

        // ম্যাট্রিক্স রেইন
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 10)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#0F0"; drops.forEach((y,i) => {
                ctx.fillText(String.fromCharCode(Math.random()*128), i*10, y*10);
                if(y*10 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);

        // সিস্টেম বুট এবং ভয়েস
        function bootSystem() {
            document.getElementById('welcome-overlay').style.display = 'none';
            const msg = new SpeechSynthesisUtterance("Welcome RK. System initialized. Secure connection established on kumedofficial dot online.");
            msg.rate = 0.9; window.speechSynthesis.speak(msg);
        }

        // এনালাইসিস সিমুলেশন
        function runAnalysis() {
            const display = document.getElementById('result-display');
            const pCont = document.getElementById('p-cont');
            const pBar = document.getElementById('p-bar');
            
            display.innerHTML = "";
            pCont.style.display = "block";
            let width = 0;
            
            const results = [
                "> Scanning Sub-domains...",
                "> Found: dev.target.com [IP: 192.168.1.1]",
                "> Found: api.target.com [SECURE]",
                "> Analyzing SSL Certificates...",
                "> Vulnerability Detected: CVE-2026-X",
                "> Fetching Data Breach Records...",
                "> Status: 105 Matches Found in DB.",
                "> REPORT GENERATED SUCCESSFULLY."
            ];

            let id = setInterval(() => {
                if (width >= 100) {
                    clearInterval(id);
                    let i = 0;
                    let resId = setInterval(() => {
                        if(i < results.length) {
                            display.innerHTML += `<div class="res-line">${results[i]}</div>`;
                            display.scrollTop = display.scrollHeight;
                            i++;
                        } else { clearInterval(resId); }
                    }, 800);
                } else {
                    width++;
                    pBar.style.width = width + '%';
                }
            }, 30);
        }

        // লগস
        const logsBox = document.getElementById('logs');
        const phrases = ["> Bypass Check...", "> Port 8080: Open", "> Sniffing Packets...", "> RK-ULTRA V5.0 Active", "> Remote Access Ready."];
        setInterval(() => {
            let p = document.createElement('p');
            p.innerText = phrases[Math.floor(Math.random()*phrases.length)];
            logsBox.appendChild(p);
            if(logsBox.children.length > 8) logsBox.removeChild(logsBox.firstChild);
        }, 1500);
    </script>
</body>
</html>
