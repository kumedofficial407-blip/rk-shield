<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK-SHIELD | AUDIO FIXED v9.5</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap');
        :root { --neon: #00ff41; --bg: #000; --danger: #ff003c; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { background: var(--bg); color: white; font-family: 'Fira Code', monospace; overflow: hidden; }
        
        /* এন্ট্রি গেট */
        #welcome-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 9999; display: flex; 
            align-items: center; justify-content: center; text-align: center;
            border: 4px solid var(--neon);
        }
        .auth-btn {
            padding: 20px 40px; border: 2px solid var(--neon); color: var(--neon);
            font-size: 1.5rem; background: transparent; font-family: 'Fira Code';
            box-shadow: 0 0 20px var(--neon); animation: pulse 1.5s infinite;
        }

        #main-content { display: none; padding: 20px; }
        header { text-align: center; border-bottom: 2px solid var(--neon); padding-bottom: 10px; }
        .glitch { font-size: 2.5rem; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div id="welcome-overlay">
        <button class="auth-btn" onclick="unlockSystem()">[ AUTHENTICATE RK ]</button>
    </div>

    <div id="main-content">
        <header>
            <h1 class="glitch">RK-SHIELD ONLINE</h1>
            <p>> SYSTEM STATUS: <span style="color:var(--neon)">CONNECTED</span></p>
        </header>
        
        <main style="margin-top: 30px; text-align: center;">
            <div style="border: 1px solid var(--neon); padding: 40px; display: inline-block;">
                <h2 style="color: var(--neon);">LIVE RECONNAISSANCE</h2>
                <p id="status-text">> Initializing Audio Engine...</p>
                <div id="logs" style="text-align: left; margin-top: 20px; color: #0f0; font-size: 0.9rem;"></div>
            </div>
        </main>
    </div>

    <audio id="beep-sound" src="https://www.soundjay.com/buttons/sounds/button-37a.mp3" preload="auto"></audio>

    <script>
        function unlockSystem() {
            // ১. সাউন্ড ইফেক্ট বাজানো
            const beep = document.getElementById('beep-sound');
            beep.play().catch(e => console.log("Audio play blocked"));

            // ২. ভয়েস কমান্ড
            const speech = new SpeechSynthesisUtterance();
            speech.text = "System authentication successful. Welcome, R K. Shield mode is now active.";
            speech.lang = 'en-US';
            speech.rate = 0.9;
            speech.pitch = 0.8;
            window.speechSynthesis.speak(speech);

            // ৩. ইন্টারফেস দেখানো
            document.getElementById('welcome-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';

            startLogs();
        }

        function startLogs() {
            const logs = document.getElementById('logs');
            const data = [
                "> Accessing Satellite...",
                "> Encrypting Connection...",
                "> RK-ULTRA V5.0 DEPLOYED.",
                "> All Systems Operational."
            ];
            let i = 0;
            setInterval(() => {
                if(i < data.length) {
                    logs.innerHTML += `<p>${data[i]}</p>`;
                    i++;
                }
            }, 1000);
        }
    </script>
</body>
</html>
