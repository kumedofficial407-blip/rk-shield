<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK-SHIELD | MASTER v19.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;700&display=swap');
        :root { --neon: #00ff41; --danger: #ff003c; --blue: #00d4ff; --purple: #bc13fe; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { background: #000; color: white; font-family: 'Fira Code', monospace; overflow: hidden; }

        /* হেডার */
        header { padding: 15px; text-align: center; border-bottom: 2px solid var(--neon); background: #050505; position: relative; z-index: 10; }
        .title { font-size: 1.8rem; color: var(--neon); text-shadow: 0 0 10px var(--neon); letter-spacing: 3px; }

        /* ড্যাশবোর্ড লেআউট */
        .main-layout { display: flex; height: calc(100vh - 65px); }
        .tool-sidebar { width: 250px; background: #080808; border-right: 1px solid #222; overflow-y: auto; padding: 10px; }
        .tool-btn { width: 100%; padding: 10px; background: transparent; border: 1px solid #1a1a1a; color: #666; text-align: left; margin-bottom: 5px; cursor: pointer; font-size: 0.75rem; }
        .tool-btn:hover, .tool-btn.active { border-color: var(--neon); color: var(--neon); background: rgba(0,255,65,0.05); }

        .terminal-area { flex: 1; padding: 15px; display: flex; flex-direction: column; background: #000; position: relative; }
        #console { flex: 1; background: rgba(0,0,0,0.9); border: 1px solid #222; border-radius: 5px; padding: 15px; overflow-y: auto; font-size: 0.85rem; color: var(--neon); line-height: 1.5; }

        /* কাস্টম মাস্টার পপ-আপ (সাদা বক্সের বদলে এটি আসবে) */
        #custom-alert {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 320px; background: #0a0a0a; border: 2px solid var(--purple);
            padding: 25px; border-radius: 10px; display: none; z-index: 2000;
            text-align: center; box-shadow: 0 0 50px var(--purple);
            animation: popIn 0.3s ease-out;
        }
        .key-input { width: 100%; padding: 10px; background: #000; border: 1px solid var(--purple); color: #fff; margin: 15px 0; text-align: center; font-family: 'Fira Code'; }
        .btn-unlock { background: var(--purple); border: none; padding: 10px 20px; color: #fff; font-weight: bold; cursor: pointer; width: 100%; border-radius: 3px; }

        /* গ্রাফিক এনিমেশন */
        @keyframes popIn { from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        .status-bar { padding: 8px; background: #0a0a0a; display: flex; justify-content: space-between; font-size: 0.65rem; color: #444; border-top: 1px solid #111; }
    </style>
</head>
<body onclick="startVoice()">

    <header>
        <div class="title">RK-SHIELD OMNI-CONTROL</div>
    </header>

    <div class="main-layout">
        <div class="tool-sidebar" id="sidebar"></div>
        <div class="terminal-area">
            <div id="console">
                <p>> [SYSTEM] Waiting for Master Authorization...</p>
                <p>> [SYSTEM] Use Master Key for God-Mode Access.</p>
            </div>
            <div class="status-bar">
                <span>SECURE_TUNNEL: ACTIVE | RK-CORE: v19.0</span>
                <span id="clock">00:00:00</span>
            </div>
        </div>
    </div>

    <div id="custom-alert">
        <h3 id="alert-title" style="color: var(--purple); font-size: 1rem;">LICENSE REQUIRED</h3>
        <p id="alert-msg" style="font-size: 0.7rem; color: #888; margin-top: 10px;">This tool is locked. Enter Master Key.</p>
        <input type="text" class="key-input" id="key-val" placeholder="ENTER MASTER KEY">
        <button class="btn-unlock" onclick="verifyMasterKey()">AUTHENTICATE</button>
        <p style="margin-top: 10px; font-size: 0.6rem; color: var(--neon); cursor: pointer;" onclick="closeAlert()">[ CANCEL ]</p>
    </div>

    <script>
        const tools = ["Sat-Ping", "Zero-Day Explorer", "Neural-Sniffer", "Bio-Metric Bypass", "Quantum-Key", "Dark-Crawler", "SQL-Auto", "IP-Vanish", "Cloud-Cracker", "Deep-Fake Scan", "Ghost-Mode", "Proxy-Chain", "MAC-Spoofer", "SSL-Stripper", "XSS-Hunter", "Packet-Intercepter", "RAM-Scraper", "Kernel-Exploit", "DDoS-Shield", "Backdoor-Gen", "Payload-Deployer", "Rootkit-Scan", "DNS-Poisoner", "Wifi-jammer", "RFID-Clone", "Signal-Interference", "Logic-Bomb", "Data-Wiper", "Meta-Sploit V9", "Ransom-Shield", "I2P-Router", "Tor-Bridge", "Onion-Search", "Crypto-Tracker", "NFT-Authenticator", "Smart-Contract Audit", "Blockchain-Scan", "VPS-Rooter", "Firewall-Evasion", "Phish-Detector", "Keylog-Hunter", "Stealth-Shell", "Botnet-Control", "Honey-Pot Gen", "Reverse-Engineer", "ASM-Decoder", "Buffer-Overflow", "Zero-Knowledge Proof"];
        
        const sidebar = document.getElementById('sidebar');
        const consoleBox = document.getElementById('console');
        let currentTool = "";

        tools.forEach(t => {
            const btn = document.createElement('button');
            btn.className = 'tool-btn';
            btn.innerText = `> ${t.toUpperCase()}`;
            btn.onclick = () => {
                currentTool = t;
                showAlert();
            };
            sidebar.appendChild(btn);
        });

        function showAlert() {
            document.getElementById('custom-alert').style.display = 'block';
            document.getElementById('key-val').focus();
        }

        function closeAlert() {
            document.getElementById('custom-alert').style.display = 'none';
        }

        function verifyMasterKey() {
            const key = document.getElementById('key-val').value;
            // তোমার গোপন মাস্টার কি: RK-MASTER-GOD-99
            if(key === "RK-MASTER-GOD-99") {
                closeAlert();
                executeTool(currentTool);
            } else {
                document.getElementById('alert-title').innerText = "ACCESS DENIED";
                document.getElementById('alert-title').style.color = "red";
                setTimeout(() => {
                    document.getElementById('alert-title').innerText = "LICENSE REQUIRED";
                    document.getElementById('alert-title').style.color = "var(--purple)";
                }, 1000);
            }
        }

        function executeTool(name) {
            consoleBox.innerHTML += `<p style="color: var(--blue); margin-top: 10px;">> [MASTER_AUTH] Access Granted for ${name}...</p>`;
            consoleBox.innerHTML += `<p style="color: #fff;">> Initializing ${name} core protocols...</p>`;
            
            let i = 0;
            const sim = [
                `Connecting to remote node... [OK]`,
                `Bypassing firewall layers... [OK]`,
                `Extracting target metadata... [OK]`,
                `Task completed successfully.`
            ];
            
            const interval = setInterval(() => {
                if(i < sim.length) {
                    const p = document.createElement('p');
                    p.innerText = `> ${sim[i]}`;
                    consoleBox.appendChild(p);
                    consoleBox.scrollTop = consoleBox.scrollHeight;
                    i++;
                } else { clearInterval(interval); }
            }, 800);
        }

        function startVoice() {
            const msg = new SpeechSynthesisUtterance("R K Shield v19 Master access online. Custom UI loaded.");
            msg.rate = 0.9; window.speechSynthesis.speak(msg);
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
